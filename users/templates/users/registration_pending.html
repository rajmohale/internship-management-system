{% extends 'base.html' %}

{% block title %}Registration Pending{% endblock %}

{% block content %}
<div class="alert alert-info mt-4">

    <h4>Your {{ role|title }} registration is pending approval.</h4>

    <p>Please wait for confirmation from the responsible authority.</p>

    <a href="{% url 'login' %}" class="btn btn-primary mt-3">
        Go to Login
    </a>

</div>
{% endblock %}

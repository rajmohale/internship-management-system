{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<h2 class="mb-4"> Internship Management System</h2>

<div class="row text-center">

<div class="col-md-3">
<div class="card bg-primary text-white shadow">
<div class="card-body">
<h4>{{ students }}</h4>
Students
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white shadow">
<div class="card-body">
<h4>{{ faculty }}</h4>
Faculty
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-white shadow">
<div class="card-body">
<h4>{{ internships }}</h4>
Internships
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-info text-white shadow">
<div class="card-body">
<h4>{{ applied }}</h4>
Applications
</div>
</div>
</div>

</div>


<hr class="my-4">


<div class="row">

<div class="col-md-6">
<div class="card shadow">
<div class="card-body">
<h5 class="card-title">System Overview</h5>
<canvas id="internshipChart"></canvas>
</div>
</div>
</div>


<div class="col-md-6">
<div class="card shadow">
<div class="card-body">
<h5 class="card-title">Application Status</h5>
<canvas id="statusChart"></canvas>
</div>
</div>
</div>

</div>

</div>



<script>

document.addEventListener("DOMContentLoaded", function(){

const internshipChart = new Chart(
document.getElementById('internshipChart'),
{
type: 'bar',
data: {
labels: ['Students','Faculty','Internships'],
datasets: [{
label: 'System Data',
data: [{{ students }}, {{ faculty }}, {{ internships }}],
backgroundColor:[
'#0d6efd',
'#198754',
'#ffc107'
]
}]
}
});


const statusChart = new Chart(
document.getElementById('statusChart'),
{
type: 'pie',
data: {
labels: ['Applied','Approved','Completed'],
datasets: [{
data: [{{ applied }}, {{ approved }}, {{ completed }}],
backgroundColor:[
'#0dcaf0',
'#198754',
'#6f42c1'
]
}]
}
});

});

</script>

{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Review Offer Letter</h3>
    <p><strong>Student:</strong> {{ permission.student.get_full_name }}</p>
    <p><strong>Internship:</strong> {{ permission.internship.title }}</p>
    <p><strong>Submitted At:</strong> {{ permission.submitted_at }}</p>
    <a href="{{ permission.offer_letter.url }}" class="btn btn-secondary mb-3">View Offer Letter</a>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" name="action" value="approve" class="btn btn-success">Approve</button>
        <button type="submit" name="action" value="reject" class="btn btn-danger">Reject</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Apply Internship{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h3>Apply for {{ internship.title }}</h3>
        </div>

        <div class="card-body">
            <h5 class="mb-3">Application Form</h5>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="resume" class="form-label">Resume (PDF/DOCX) *</label>
                    <input type="file" name="resume" id="resume" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="cover_letter" class="form-label">Cover Letter (Optional)</label>
                    <input type="file" name="cover_letter" id="cover_letter" class="form-control">
                </div>

                <button type="submit" class="btn btn-success">Submit Application</button>
                <a href="{% url 'internship_detail' internship.id %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
